syntax = "proto3";

package tak.proto.v1;

message NodeInfo {
  string node_id = 1;
  string display_name = 2;
  string base_url = 3;
  bool healthy = 4;
  repeated string pools = 5;
  repeated string tags = 6;
  repeated string capabilities = 7;
  string transport = 8;
  string transport_state = 9;
  string transport_detail = 10;
}

message RemoteTokenPayload {
  string version = 1;
  NodeInfo node = 2;
  string bearer_token = 3;
}

message CmdStep {
  repeated string argv = 1;
  optional string cwd = 2;
  map<string, string> env = 3;
}

message ScriptStep {
  string path = 1;
  repeated string argv = 2;
  optional string interpreter = 3;
  optional string cwd = 4;
  map<string, string> env = 5;
}

message Step {
  oneof kind {
    CmdStep cmd = 1;
    ScriptStep script = 2;
  }
}

message ContainerRuntime {
  optional string image = 1;
  optional string dockerfile = 2;
  optional string build_context = 3;
  optional ContainerResourceLimits resource_limits = 4;
}

message ContainerResourceLimits {
  double cpu_cores = 1;
  uint64 memory_mb = 2;
}

message RuntimeSpec {
  oneof kind {
    ContainerRuntime container = 1;
  }
}

message SubmittedNeed {
  string name = 1;
  string scope = 2;
  optional string scope_key = 3;
  double slots = 4;
}

message FixedRetryBackoff {
  double seconds = 1;
}

message ExpJitterRetryBackoff {
  double min_s = 1;
  double max_s = 2;
  string jitter = 3;
}

message RetryBackoff {
  oneof kind {
    FixedRetryBackoff fixed = 1;
    ExpJitterRetryBackoff exp_jitter = 2;
  }
}

message RetryPolicy {
  uint32 attempts = 1;
  repeated int32 on_exit = 2;
  optional RetryBackoff backoff = 3;
}

message FusedTaskMember {
  string task_label = 1;
  repeated Step steps = 2;
  optional uint64 timeout_s = 3;
  optional RetryPolicy retry = 4;
  optional string execution_label = 5;
}

message OutputSelector {
  oneof kind {
    string path = 1;
    string glob = 2;
  }
}

message SubmitTaskRequest {
  string task_run_id = 1;
  uint32 attempt = 2;
  bytes workspace_zip = 3;
  repeated Step steps = 4;
  optional uint64 timeout_s = 5;
  optional RuntimeSpec runtime = 6;
  string task_label = 7;
  repeated SubmittedNeed needs = 8;
  repeated OutputSelector outputs = 9;
  optional ExecutionSession session = 10;
  optional string origin = 11;
  optional string runtime_source = 12;
  optional string command = 13;
  repeated FusedTaskMember fused_members = 14;
  optional string execution_label = 15;
}

message ExecutionSession {
  string key = 1;
  string name = 2;
  string reuse = 3;
  repeated OutputSelector share_paths = 4;
}

message SubmitTaskResponse {
  bool accepted = 1;
  bool attached = 2;
  string idempotency_key = 3;
  bool remote_worker = 4;
}

message RemoteEvent {
  uint64 seq = 1;
  string kind = 2;
  int64 timestamp_ms = 3;
  optional bool success = 4;
  optional int32 exit_code = 5;
  optional string message = 6;
  optional string chunk = 7;
  bytes chunk_bytes = 8;
}

message PollTaskEventsResponse {
  repeated RemoteEvent events = 1;
  bool done = 2;
}

message OutputFile {
  string path = 1;
  string digest = 2;
  uint64 size_bytes = 3;
}

message GetTaskResultResponse {
  bool success = 1;
  optional int32 exit_code = 2;
  string status = 3;
  int64 started_at = 4;
  int64 finished_at = 5;
  int64 duration_ms = 6;
  string node_id = 7;
  string transport_kind = 8;
  optional string runtime = 9;
  optional string runtime_engine = 10;
  repeated OutputFile outputs = 11;
  optional string stdout_tail = 12;
  optional string stderr_tail = 13;
}

message CancelTaskResponse {
  bool cancelled = 1;
  string task_run_id = 2;
}

message CpuUsage {
  optional double utilization_percent = 1;
  uint32 logical_cores = 2;
  optional double non_tak_used_cores = 3;
  optional double tak_reserved_cores = 4;
  optional double tak_admission_available_cores = 5;
}

message MemoryUsage {
  uint64 used_bytes = 1;
  uint64 total_bytes = 2;
  optional uint64 available_bytes = 3;
  optional uint64 non_tak_used_bytes = 4;
  optional uint64 tak_reserved_bytes = 5;
  optional uint64 tak_admission_available_bytes = 6;
}

message StorageUsage {
  string path = 1;
  uint64 total_bytes = 2;
  uint64 available_bytes = 3;
  uint64 used_bytes = 4;
  uint64 tak_execution_bytes = 5;
}

message ImageCacheStatus {
  uint64 used_bytes = 1;
  uint64 budget_bytes = 2;
  uint64 evictable_bytes = 3;
  uint64 entry_count = 4;
  uint64 filesystem_available_bytes = 5;
  uint64 filesystem_total_bytes = 6;
  uint64 free_floor_bytes = 7;
}

message AggregatedNeedUsage {
  string name = 1;
  string scope = 2;
  optional string scope_key = 3;
  double slots = 4;
}

message ActiveJob {
  string task_run_id = 1;
  uint32 attempt = 2;
  string task_label = 3;
  int64 started_at_ms = 4;
  repeated SubmittedNeed needs = 5;
  uint64 execution_root_bytes = 6;
  optional string runtime = 7;
  optional string origin = 8;
  optional string runtime_source = 9;
  optional string command = 10;
  optional ContainerResourceLimits resource_limits = 11;
  optional string execution_label = 12;
}

message QueuedJob {
  string task_run_id = 1;
  uint32 attempt = 2;
  string task_label = 3;
  int64 queued_at_ms = 4;
  uint32 queue_position = 5;
  optional ContainerResourceLimits resource_limits = 6;
  optional string runtime = 7;
  optional string origin = 8;
  optional string runtime_source = 9;
  optional string command = 10;
  optional string execution_label = 11;
}

message TaskAttemptSummary {
  string task_run_id = 1;
  uint32 attempt = 2;
  string task_label = 3;
  string node_id = 4;
  string state = 5;
  int64 created_at_ms = 6;
  optional int64 finished_at_ms = 7;
  optional string execution_label = 8;
}

message ListTaskAttemptsResponse {
  repeated TaskAttemptSummary attempts = 1;
}

message NodeStatusResponse {
  NodeInfo node = 1;
  int64 sampled_at_ms = 2;
  CpuUsage cpu = 3;
  MemoryUsage memory = 4;
  StorageUsage storage = 5;
  repeated AggregatedNeedUsage allocated_needs = 6;
  repeated ActiveJob active_jobs = 7;
  ImageCacheStatus image_cache = 8;
  repeated QueuedJob queued_jobs = 9;
}

message ErrorResponse {
  string message = 1;
}
