name: Release

on:
  push:
    branches:
      - '**'

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare_tag:
    name: Prepare release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      head_sha: ${{ github.sha }}
    steps:
      - name: Checkout pushed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Compute and push tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          head_sha="${{ github.sha }}"
          git fetch --force --tags origin

          workspace_version="$(awk '
            $0 == "[workspace.package]" { in_section=1; next }
            /^\[/ { in_section=0 }
            in_section && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"

          if [ -z "$workspace_version" ]; then
            echo "failed to read workspace version from Cargo.toml" >&2
            exit 1
          fi

          tag="v${workspace_version}-${head_sha:0:8}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            existing_sha="$(git rev-list -n1 "${tag}")"
            if [ "$existing_sha" != "$head_sha" ]; then
              tag="v${workspace_version}-${head_sha:0:12}"
            fi
          fi

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            existing_sha="$(git rev-list -n1 "${tag}")"
            if [ "$existing_sha" != "$head_sha" ]; then
              tag="v${workspace_version}-${head_sha}"
            fi
          fi

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            existing_sha="$(git rev-list -n1 "${tag}")"
            if [ "$existing_sha" != "$head_sha" ]; then
              echo "tag ${tag} already exists at ${existing_sha}, expected ${head_sha}" >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" "$head_sha" -m "Release $tag"
            git push origin "$tag"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  build_artifacts:
    name: Build ${{ matrix.target }}
    needs: prepare_tag
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_zig: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            use_zig: true
          - os: macos-14
            target: x86_64-apple-darwin
            use_zig: false
          - os: macos-14
            target: aarch64-apple-darwin
            use_zig: false
    env:
      CARGO_TERM_COLOR: always
      TAK_BUILD_VERSION: ${{ needs.prepare_tag.outputs.version }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_tag.outputs.tag }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Zig
        if: matrix.use_zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.use_zig
        run: cargo install cargo-zigbuild --locked

      - name: Build tak and takd
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_zig }}" = "true" ]; then
            cargo zigbuild --release --locked --target "${{ matrix.target }}" -p tak -p takd
          else
            cargo build --release --locked --target "${{ matrix.target }}" -p tak -p takd
          fi

      - name: Verify tak --version matches injected build version
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          expected="tak ${TAK_BUILD_VERSION}"
          actual="$(target/${target}/release/tak --version | tr -d '\r')"
          if [ "$actual" != "$expected" ]; then
            echo "version mismatch: expected '${expected}', got '${actual}'" >&2
            exit 1
          fi

      - name: Package release artifacts
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare_tag.outputs.tag }}"
          target="${{ matrix.target }}"

          mkdir -p dist/pkg
          cp "target/${target}/release/tak" dist/pkg/tak
          cp "target/${target}/release/takd" dist/pkg/takd
          chmod +x dist/pkg/tak dist/pkg/takd

          archive="tak-${tag}-${target}.tar.gz"
          tar -C dist/pkg -czf "dist/${archive}" tak takd
          shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  publish_release:
    name: Publish GitHub release
    needs:
      - prepare_tag
      - build_artifacts
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_BRANCH: ${{ github.ref_name }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create or update release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare_tag.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            if [ "${RELEASE_BRANCH}" = "main" ]; then
              gh release create "$tag" dist/* --title "$tag" --generate-notes
            else
              gh release create "$tag" dist/* --title "$tag" --generate-notes --prerelease
            fi
          fi
