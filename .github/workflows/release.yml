name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare_tag:
    name: Prepare release tag
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      head_sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout commit from successful CI run
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Compute and push tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          head_sha="${{ github.event.workflow_run.head_sha }}"
          git fetch --force --tags origin

          semver_on_sha="$(git tag --points-at "$head_sha" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          if [ -n "$semver_on_sha" ]; then
            tag="$semver_on_sha"
          else
            latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1)"
            if [ -z "$latest_tag" ]; then
              workspace_version="$(awk '
                $0 == "[workspace.package]" { in_section=1; next }
                /^\[/ { in_section=0 }
                in_section && $1 == "version" {
                  gsub(/\"/, "", $3)
                  print $3
                  exit
                }
              ' Cargo.toml)"
              tag="v${workspace_version}"
            else
              version_no_prefix="${latest_tag#v}"
              IFS='.' read -r major minor patch <<<"$version_no_prefix"
              patch="$((patch + 1))"
              tag="v${major}.${minor}.${patch}"
            fi

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" "$head_sha" -m "Release $tag"
            git push origin "$tag"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  build_artifacts:
    name: Build ${{ matrix.target }}
    needs: prepare_tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_zig: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_zig: true
          - os: macos-13
            target: x86_64-apple-darwin
            use_zig: false
          - os: macos-14
            target: aarch64-apple-darwin
            use_zig: false
    env:
      CARGO_TERM_COLOR: always
      TAK_BUILD_VERSION: ${{ needs.prepare_tag.outputs.version }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_tag.outputs.tag }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Zig
        if: matrix.use_zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.use_zig
        run: cargo install cargo-zigbuild --locked

      - name: Build tak and takd
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_zig }}" = "true" ]; then
            cargo zigbuild --release --locked --target "${{ matrix.target }}" -p tak -p takd
          else
            cargo build --release --locked --target "${{ matrix.target }}" -p tak -p takd
          fi

      - name: Package release artifacts
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare_tag.outputs.tag }}"
          target="${{ matrix.target }}"

          mkdir -p dist/pkg
          cp "target/${target}/release/tak" dist/pkg/tak
          cp "target/${target}/release/takd" dist/pkg/takd
          chmod +x dist/pkg/tak dist/pkg/takd

          archive="tak-${tag}-${target}.tar.gz"
          tar -C dist/pkg -czf "dist/${archive}" tak takd
          shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  publish_release:
    name: Publish GitHub release
    needs:
      - prepare_tag
      - build_artifacts
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create or update release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare_tag.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --title "$tag" --generate-notes
          fi
