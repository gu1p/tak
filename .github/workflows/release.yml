name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

# Opt JavaScript actions into Node.js 24 ahead of the Node 20 removal
# (GitHub is forcing this by 2026-06-16 and removing Node 20 by 2026-09-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare_tag:
    name: Prepare release tag
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      head_sha: ${{ steps.tag.outputs.head_sha }}
    steps:
      - name: Checkout CI head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Compute release version
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          head_sha="${{ github.event.workflow_run.head_sha }}"
          git fetch --force --tags origin

          workspace_version="$(awk '
            $0 == "[workspace.package]" { in_section=1; next }
            /^\[/ { in_section=0 }
            in_section && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"

          if [ -z "$workspace_version" ]; then
            echo "failed to read workspace version from Cargo.toml" >&2
            exit 1
          fi

          bash scripts/compute_release_version.sh "$workspace_version" "$head_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

  build_artifacts:
    name: Build ${{ matrix.target }}
    needs: prepare_tag
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_zig: true
            tak_task: //:package-release-x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            use_zig: true
            tak_task: //:package-release-aarch64-unknown-linux-musl
          - os: macos-15-intel
            target: x86_64-apple-darwin
            use_zig: false
            tak_task: //:package-release-x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            use_zig: false
            tak_task: //:package-release-aarch64-apple-darwin
    env:
      CARGO_TERM_COLOR: always
      TAK_RELEASE_TAG: ${{ needs.prepare_tag.outputs.tag }}
      TAK_BUILD_VERSION: ${{ needs.prepare_tag.outputs.version }}
    steps:
      - name: Checkout CI head
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_tag.outputs.head_sha }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Tak from checkout
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --bins -p tak -p takd
          echo "$PWD/target/debug" >> "$GITHUB_PATH"

      - name: Show Tak version
        run: tak --version

      - name: Setup Zig
        if: matrix.use_zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.use_zig
        run: cargo install cargo-zigbuild --locked

      - name: Build and package via Tak
        run: tak run "${{ matrix.tak_task }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist-manual/*.tar.gz
            dist-manual/*.tar.gz.sha256

  publish_release:
    name: Publish GitHub release
    needs:
      - prepare_tag
      - build_artifacts
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout CI head
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_tag.outputs.head_sha }}
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create or update release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare_tag.outputs.tag }}"
          head_sha="${{ needs.prepare_tag.outputs.head_sha }}"

          git fetch --force --tags origin
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            existing_sha="$(git rev-list -n1 "${tag}")"
            if [ "$existing_sha" != "$head_sha" ]; then
              echo "tag ${tag} already exists at ${existing_sha}, expected ${head_sha}" >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" "$head_sha" -m "Release $tag"
            git push origin "refs/tags/${tag}"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --title "$tag" --generate-notes --target "$head_sha"
          fi
