name: CI

on:
  pull_request:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  checks:
    name: Lint, Test, and Coverage
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Run doctests
        run: cargo test --workspace --doc

      - name: Validate docs contract
        run: cargo test -p tak --test doctest_contract

      - name: Install coverage tool
        run: cargo install cargo-llvm-cov --locked

      - name: Enforce 75% line coverage
        run: |
          mkdir -p coverage
          cargo llvm-cov \
            --workspace \
            --all-features \
            --fail-under-lines 75 \
            --lcov \
            --output-path coverage/lcov.info

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore

  build_binaries:
    name: Build binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_zig: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            use_zig: true
          - os: macos-14
            target: x86_64-apple-darwin
            use_zig: false
          - os: macos-14
            target: aarch64-apple-darwin
            use_zig: false
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Zig
        if: matrix.use_zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.use_zig
        run: cargo install cargo-zigbuild --locked

      - name: Build tak and takd
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_zig }}" = "true" ]; then
            cargo zigbuild --release --locked --target "${{ matrix.target }}" -p tak -p takd
          else
            cargo build --release --locked --target "${{ matrix.target }}" -p tak -p takd
          fi

      - name: Verify binaries exist
        shell: bash
        run: |
          set -euo pipefail
          test -x "target/${{ matrix.target }}/release/tak"
          test -x "target/${{ matrix.target }}/release/takd"
