name: CI

on:
  pull_request:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  checks:
    name: Lint, Test, and Coverage
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tak
        shell: bash
        env:
          TAK_INSTALL_DIR: ${{ runner.temp }}/tak-bin
        run: |
          set -euo pipefail
          ./get-tak.sh
          echo "$TAK_INSTALL_DIR" >> "$GITHUB_PATH"

      - name: Show Tak version
        run: tak --version

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Tak check
        run: tak run //:check

      - name: Install coverage tool
        run: cargo install cargo-llvm-cov --locked

      - name: Reclaim disk before coverage
        shell: bash
        run: |
          set -euo pipefail
          cargo llvm-cov clean --workspace
          rm -rf target
          df -h .

      - name: Run Tak coverage
        run: tak run //:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: .tmp/coverage/lcov.info
          if-no-files-found: ignore

  build_binaries:
    name: Build binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_zig: true
            tak_task: //:build-release-x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            use_zig: true
            tak_task: //:build-release-aarch64-unknown-linux-musl
          - os: macos-14
            target: x86_64-apple-darwin
            use_zig: false
            tak_task: //:build-release-x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            use_zig: false
            tak_task: //:build-release-aarch64-apple-darwin
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tak
        shell: bash
        env:
          TAK_INSTALL_DIR: ${{ runner.temp }}/tak-bin
        run: |
          set -euo pipefail
          ./get-tak.sh
          echo "$TAK_INSTALL_DIR" >> "$GITHUB_PATH"

      - name: Show Tak version
        run: tak --version

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Zig
        if: matrix.use_zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.use_zig
        run: cargo install cargo-zigbuild --locked

      - name: Build binaries via Tak
        run: tak run "${{ matrix.tak_task }}"
